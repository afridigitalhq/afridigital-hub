services:
  - type: web
    name: afridigital-backend
    env: node

    buildCommand: bash -c "set -e;
      cd SaaS/afridigital-frontend &&
      npm install &&
      npm run build &&
      cd ../../SaaS/afridigital-backend &&
      npm install &&
      rm -rf public &&
      mkdir -p public &&
      cp -r ../afridigital-frontend/dist/* public/"

    startCommand: node SaaS/afridigital-backend/server.js
