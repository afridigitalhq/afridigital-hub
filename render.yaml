services:
  - type: web
    name: afridigital-backend
    env: node

    rootDir: .

    buildCommand: bash -c "set -e;
      cd SaaS/afridigital-frontend &&
      npm install &&
      npm run build &&
      cd ../afridigital-backend &&
      npm install"

    startCommand: node SaaS/afridigital-backend/server.js
