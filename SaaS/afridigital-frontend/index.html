<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AfriDigital SaaS Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- HERO -->
<section class="p-10 text-center bg-white shadow">
  <h1 class="text-4xl font-bold">AfriDigital</h1>
  <p class="mt-2 text-gray-600">Cybersecurity • DevOps • Monitoring Platform</p>

  <div id="system-status" class="mt-4 text-green-600 font-semibold">
    🟢 Loading system status...
  </div>
</section>

<!-- MARQUEE -->
<section class="bg-black text-white p-3 overflow-hidden">
  <div id="event-stream" class="whitespace-nowrap animate-pulse">
    🔄 Connecting to event stream...
  </div>
</section>

<!-- SERVICES -->
<section class="p-10 grid md:grid-cols-3 gap-4">
  <div class="bg-white p-5 shadow rounded">Cybersecurity Watchdog</div>
  <div class="bg-white p-5 shadow rounded">DevOps Monitoring</div>
  <div class="bg-white p-5 shadow rounded">Incident Response</div>
</section>

<!-- FOOTER -->
<footer class="p-6 text-center text-sm text-gray-500">
  © 2026 AfriDigital Innovations Hub
</footer>

<script type="module">
import API from "./src/api/client.js";

async function boot() {
  try {
    const status = await fetch(`${API}/system/status`).then(r => r.json());
    document.getElementById("system-status").innerText =
      status.online ? "🟢 System Online" : "🔴 System Offline";

    const events = await fetch(`${API}/devops/events`).then(r => r.json());
    document.getElementById("event-stream").innerText =
      events.map(e => `⚡ ${e.message}`).join(" • ");
  } catch (e) {
    document.getElementById("system-status").innerText =
      "⚠️ API Connection Failed";
  }
}

boot();
</script>

</body>
</html>
